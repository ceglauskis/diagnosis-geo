spring.application.name=agent-backend
# === Gemini Configuration (required) ===
spring.ai.google.genai.api-key=${GEMINI_API_KEY}

# === Fixes the "project-id must be set" error ===
spring.ai.google.genai.project-id=agent-backend-project

# Most cost-effective model
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite

# === Diagnosis step logging ===
diagnosis.logs.dir=logs/diagnosis
